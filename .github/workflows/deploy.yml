name: Deploy to Cloudflare Pages

# Build and publish to the existing Cloudflare Pages project on every push to main.
# Runs the test suite, writes a verifiable build-info.json into the deployed site,
# then publishes. Requires one repo secret: CLOUDFLARE_API_TOKEN.
on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Run the Gherkin/Vitest suite and capture a JSON report (gates the deploy).
      - run: npm test -- --reporter=json --outputFile=test-results.json
      # Emit public/build-info.json (commit, timestamp, test counts, Actions run URL).
      - run: node scripts/build-info.mjs
      - run: npm run build
      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 54613cc7ceeaf8e2706aa8fd14e3c773
          command: pages deploy dist --project-name=strategy-cockpit --branch=main
