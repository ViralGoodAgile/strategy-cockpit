name: Deploy to Cloudflare Pages

# Build and publish to the existing Cloudflare Pages project on every push to main.
# Runs the test suite, writes a verifiable build-info.json into the deployed site,
# then publishes. Requires one repo secret: CLOUDFLARE_API_TOKEN.
on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Run the Gherkin/Vitest suite and capture a JSON report (gates the deploy).
      - run: npm test -- --reporter=json --outputFile=test-results.json
      # Run the Playwright e2e suite too, so its count folds into the verifiable badge
      # (json reporter writes playwright-results.json). A failure here aborts the deploy.
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      # Emit public/build-info.json (commit, timestamp, combined unit+e2e counts, run URL).
      - run: node scripts/build-info.mjs
      - run: npm run build
      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 54613cc7ceeaf8e2706aa8fd14e3c773
          # Pass an explicit ASCII commit message (the SHA) rather than letting wrangler forward
          # the git commit message: Cloudflare's API rejects some valid-UTF-8 punctuation in commit
          # bodies ("Invalid commit message" [8000111]), which had broken deploys. --commit-dirty
          # silences the dirty-tree warning from generated test-results/build artifacts.
          command: pages deploy dist --project-name=strategy-cockpit --branch=main --commit-message=${{ github.sha }} --commit-dirty=true
