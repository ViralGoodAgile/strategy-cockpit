name: CI

# Typecheck + production build on every push to main and every PR into main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: these jobs only read the repo (no writes, no token escalation).
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Unit/BDD tests gate the PR (Gherkin suite via Vitest).
      - run: npm test
      # `npm run build` runs `tsc --noEmit && vite build` — fails the check on type or build errors.
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # Playwright builds + previews the app (see playwright.config.ts) and drives it.
      - run: npm run test:e2e
      # Upload the HTML report + traces/screenshots/video so a red run is debuggable.
      - if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  dependency-review:
    # On PRs only: blocks a PR that introduces a dependency with a known high/critical
    # advisory, before it can reach main. Complements Dependabot (which alerts on what's
    # already in) by gating what's coming in. Reviews only the PR's dependency diff.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
